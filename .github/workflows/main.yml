name: Build MindfulWake APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating..."
            gradle wrapper --gradle-version 8.3
          fi

      - name: Grant Execute Permission to Gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "ERROR: gradlew still not found!"
            exit 1
          fi

      - name: Build Debug APK with Gradle Wrapper
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            echo "Using gradle directly..."
            gradle assembleDebug --no-daemon --stacktrace
          fi
        env:
          GRADLE_OPTS: '-Xmx2048m -XX:+UseG1GC'

      - name: Verify APK Generated
        run: |
          ls -lh app/build/outputs/apk/debug/
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK successfully created!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MindfulWake-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## 🎉 Build Report" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $([ -f 'app/build/outputs/apk/debug/app-debug.apk' ] && echo '✅ SUCCESS' || echo '❌ FAILED')" >> $GITHUB_STEP_SUMMARY
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "**APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "**Location:** app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Build Time:** ~8-10 minutes" >> $GITHUB_STEP_SUMMARY
