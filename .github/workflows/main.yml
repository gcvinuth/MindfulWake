name: Build & Release MindfulWake APK

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant Gradlew Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release' && github.event_name != 'pull_request' || github.event_name == 'push'
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: '-Xmx4096m -XX:+UseG1GC'

      - name: Build Release APK (Unsigned)
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: '-Xmx4096m -XX:+UseG1GC'

      # ═════════════════════════════════════════════════════════════
      # OPTIONAL: Sign Release APK (requires keystore secrets)
      # ═════════════════════════════════════════════════════════════
      - name: Decode Keystore from Base64
        if: github.event.inputs.build_type == 'release' && secrets.KEYSTORE_BASE64 != ''
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/mindfulwake.jks
          ls -lh ~/.android/mindfulwake.jks

      - name: Sign Release APK
        if: github.event.inputs.build_type == 'release' && secrets.KEYSTORE_BASE64 != ''
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore ~/.android/mindfulwake.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.KEY_ALIAS }}

      - name: Zipalign Release APK
        if: github.event.inputs.build_type == 'release' && secrets.KEYSTORE_BASE64 != ''
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-signed.apk

      # ═════════════════════════════════════════════════════════════
      # Upload Build Artifacts
      # ═════════════════════════════════════════════════════════════
      - name: Upload Debug APK Artifact
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: MindfulWake-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK Artifact (Signed)
        if: github.event.inputs.build_type == 'release' && secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: MindfulWake-release-signed-apk
          path: app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Release APK Artifact (Unsigned)
        if: github.event.inputs.build_type == 'release' && secrets.KEYSTORE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: MindfulWake-release-unsigned-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/outputs/
          retention-days: 7

      # ═════════════════════════════════════════════════════════════
      # Generate Build Report
      # ═════════════════════════════════════════════════════════════
      - name: Generate Build Report
        if: always()
        run: |
          echo "# 🎉 MindfulWake Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit Message:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "## ✅ Debug Build Successful" >> $GITHUB_STEP_SUMMARY
            echo "- **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **Download:** See artifacts below" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/apk/release/app-release-signed.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/release/app-release-signed.apk | cut -f1)
            echo "## ✅ Release Build Successful (Signed)" >> $GITHUB_STEP_SUMMARY
            echo "- **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1)
            echo "## ⚠️ Release Build Successful (Unsigned)" >> $GITHUB_STEP_SUMMARY
            echo "- **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **Note:** Keystore secrets not configured. APK is unsigned." >> $GITHUB_STEP_SUMMARY
          fi

      # ═════════════════════════════════════════════════════════════
      # Create GitHub Release (on tag)
      # ═════════════════════════════════════════════════════════════
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-signed.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ═════════════════════════════════════════════════════════════
      # Optional: Slack Notification
      # ═════════════════════════════════════════════════════════════
      - name: Notify Slack on Success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ MindfulWake APK Built Successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*MindfulWake Build Status*\n✅ Build Successful\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Build"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ MindfulWake APK Build Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*MindfulWake Build Failed*\n❌ Build Error\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
